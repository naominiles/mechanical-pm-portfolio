version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: mechanical-pm-db
    restart: always
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp-network

  # WordPress
  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    container_name: mechanical-pm-wp
    restart: always
    ports:
      - "8000:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: 1
    volumes:
      - ./wordpress:/var/www/html
      - ./wp-content/themes/mechanical-pm-theme:/var/www/html/wp-content/themes/mechanical-pm-theme
    networks:
      - wp-network

  # phpMyAdmin (optional - for database management)
  phpmyadmin:
    depends_on:
      - db
    image: phpmyadmin:latest
    container_name: mechanical-pm-phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    networks:
      - wp-network

volumes:
  db_data:

networks:
  wp-network:
    driver: bridge
